<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName notes.snh.one

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    DocumentRoot /var/www/notesorganizer/client/dist

    <Directory /var/www/notesorganizer/client/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback — serve index.html for all non-file routes
        FallbackResource /index.html
    </Directory>

    # Static file caching
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=2592000, immutable"
    </LocationMatch>

    # Gzip compression (requires mod_deflate — enabled by default on Ubuntu)
    AddOutputFilterByType DEFLATE text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml

    # API proxy to Node.js backend
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3001/api/
    ProxyPassReverse /api/ http://127.0.0.1:3001/api/

    # Increase body size for image uploads (10 MB)
    LimitRequestBody 10485760

    # Pass real client IP to backend
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}s"

    ErrorLog ${APACHE_LOG_DIR}/notesorganizer-error.log
    CustomLog ${APACHE_LOG_DIR}/notesorganizer-access.log combined
SSLCertificateFile /etc/letsencrypt/live/notes.snh.one/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/notes.snh.one/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>

# HT</VirtualHost>
</IfModule>
